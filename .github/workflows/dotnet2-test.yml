
name: .NET2 Test

on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET 2.1.x
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '2.1.x'
    - name: Build
      run: dotnet build
    - name: Test
      run: dotnet test Test/Test.csproj --logger:"console;verbosity=detailed"
