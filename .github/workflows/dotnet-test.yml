
name: .NET Test

on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET 5.0.X
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 5.0.X
    - name: Build
      run: dotnet build
    - name: Test
      run: dotnet test Test/Test.csproj --verbosity normal
